<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeekFlow — Трекер задач</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f8;
    --surface: #ffffff;
    --surface2: #f7f8fc;
    --border: #e2e5f0;
    --border2: #d0d4e8;
    --accent: #4f7cff;
    --accent-light: #eef1ff;
    --text: #1a1d2e;
    --text-muted: #8a8fa8;
    --text-soft: #5a5f7a;
    --radius: 16px;
    --shadow: 0 2px 12px rgba(79,124,255,0.08);
    --shadow-hover: 0 8px 24px rgba(79,124,255,0.14);
    --p-high: #ff4d6d;
    --p-high-bg: #fff0f3;
    --p-high-border: #ffc2cc;
    --p-mid: #ff9f43;
    --p-mid-bg: #fff8f0;
    --p-mid-border: #ffd9a8;
    --p-low: #26d07c;
    --p-low-bg: #f0fef7;
    --p-low-border: #a8f0cd;
    --c-work: #4f7cff;
    --c-personal: #b45fff;
    --c-health: #26d07c;
    --c-study: #ff9f43;
    --c-other: #8a8fa8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,124,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,124,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 32px 0 40px;
    border-bottom: 1.5px solid var(--border);
    margin-bottom: 36px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -1px;
  }
  .logo span { color: var(--accent); }

  .current-date {
    font-size: 13px;
    color: var(--text-muted);
    background: var(--surface);
    padding: 8px 16px;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow);
  }

  .week-overview {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
    margin-bottom: 36px;
  }

  .week-mini {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.22s ease;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .week-mini::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    transform: scaleX(var(--pct, 0));
    transform-origin: left;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .week-mini.active { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 4px 16px rgba(79,124,255,0.18); }
  .week-mini.today .day-abbr { color: var(--accent); font-weight: 800; }
  .week-mini:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }

  .day-abbr {
    font-family: 'Syne', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 6px;
  }

  .day-pct { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); }
  .week-mini.active .day-pct { color: var(--accent); }
  .day-task-count { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

  .main-grid { display: grid; grid-template-columns: 1fr 360px; gap: 20px; }

  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
    .week-overview { grid-template-columns: repeat(4, 1fr); }
  }

  .day-panel {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .day-header {
    padding: 24px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1.5px solid var(--border);
    background: linear-gradient(135deg, #f7f8ff, #ffffff);
  }

  .day-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }

  .day-progress-ring { position: relative; width: 68px; height: 68px; }
  .day-progress-ring svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 5; }
  .ring-fill {
    fill: none; stroke: var(--accent); stroke-width: 5;
    stroke-linecap: round;
    stroke-dasharray: 188; stroke-dashoffset: 188;
    transition: stroke-dashoffset 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .ring-pct {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800; color: var(--accent);
  }

  .filters {
    display: flex; gap: 8px;
    padding: 14px 20px;
    border-bottom: 1.5px solid var(--border);
    flex-wrap: wrap;
    background: var(--surface2);
  }

  .filter-btn {
    padding: 5px 12px;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: 'Manrope', sans-serif;
    font-size: 12px; font-weight: 600;
    color: var(--text-muted);
    cursor: pointer; transition: all 0.18s;
    display: flex; align-items: center; gap: 5px;
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
  .cat-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; }

  .task-list { padding: 16px 20px; min-height: 280px; }

  .task-empty { text-align: center; padding: 50px 20px; color: var(--text-muted); }
  .task-empty .empty-icon { font-size: 40px; margin-bottom: 10px; opacity: 0.5; }

  .task-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    border-radius: 12px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    margin-bottom: 8px;
    transition: all 0.2s ease;
    animation: slideIn 0.28s ease;
    position: relative; overflow: hidden;
  }

  .task-item::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
  }

  .task-item.priority-high::before { background: var(--p-high); }
  .task-item.priority-mid::before  { background: var(--p-mid); }
  .task-item.priority-low::before  { background: var(--p-low); }

  .task-item.priority-high { border-color: var(--p-high-border); background: var(--p-high-bg); }
  .task-item.priority-mid  { border-color: var(--p-mid-border);  background: var(--p-mid-bg); }
  .task-item.priority-low  { border-color: var(--p-low-border);  background: var(--p-low-bg); }

  .task-item:hover { transform: translateX(3px); box-shadow: var(--shadow); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .task-checkbox {
    width: 20px; height: 20px; border-radius: 6px;
    border: 2px solid var(--border2);
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; background: var(--surface);
  }
  .task-checkbox.checked { background: var(--accent); border-color: var(--accent); }
  .task-checkbox.checked::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 800; }

  .task-body { flex: 1; min-width: 0; }

  .task-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }

  .task-cat-badge, .task-priority-badge {
    font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 100px;
  }

  .badge-work     { background: #eef1ff; color: var(--c-work); }
  .badge-personal { background: #f7eeff; color: var(--c-personal); }
  .badge-health   { background: #edfff7; color: var(--c-health); }
  .badge-study    { background: #fff8ee; color: var(--c-study); }
  .badge-other    { background: #f4f4f8; color: var(--c-other); }
  .badge-high { background: var(--p-high-bg); color: var(--p-high); }
  .badge-mid  { background: var(--p-mid-bg);  color: var(--p-mid); }
  .badge-low  { background: var(--p-low-bg);  color: var(--p-low); }

  .task-text {
    font-size: 14px; font-weight: 500; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .task-text.done { text-decoration: line-through; color: var(--text-muted); }

  .task-delete {
    width: 26px; height: 26px; border-radius: 8px;
    border: none; background: transparent;
    color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; opacity: 0; transition: all 0.18s; flex-shrink: 0;
  }
  .task-item:hover .task-delete { opacity: 1; }
  .task-delete:hover { background: var(--p-high-bg); color: var(--p-high); }

  .add-form {
    padding: 16px 20px;
    border-top: 1.5px solid var(--border);
    background: var(--surface2);
  }

  .add-row-top { display: flex; gap: 8px; margin-bottom: 10px; }

  .add-input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 11px 16px;
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .add-input:focus { border-color: var(--accent); }
  .add-input::placeholder { color: var(--text-muted); }

  .add-btn {
    background: var(--accent); color: #fff;
    border: none; border-radius: 12px;
    padding: 11px 20px;
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(79,124,255,0.25);
  }
  .add-btn:hover { transform: scale(1.04); box-shadow: 0 6px 18px rgba(79,124,255,0.35); }

  .add-row-bottom { display: flex; gap: 8px; }

  .select-styled {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 7px 12px;
    font-family: 'Manrope', sans-serif;
    font-size: 12px; font-weight: 600;
    color: var(--text); cursor: pointer; outline: none;
    transition: border-color 0.2s; flex: 1;
  }
  .select-styled:focus { border-color: var(--accent); }

  .stats-panel { display: flex; flex-direction: column; gap: 16px; }

  .stats-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: var(--shadow);
  }

  .stats-card h3 {
    font-family: 'Syne', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 18px;
  }

  .stat-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .stat-row:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .stat-label { font-size: 13px; color: var(--text-soft); font-weight: 500; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
  .stat-value.blue  { color: var(--accent); }
  .stat-value.green { color: var(--p-low); }
  .stat-value.pink  { color: var(--p-high); }

  .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 90px; }

  .bar-wrap {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 6px; height: 100%; cursor: pointer;
  }
  .bar-col { flex: 1; width: 100%; display: flex; align-items: flex-end; }
  .bar-fill {
    width: 100%; background: var(--border);
    border-radius: 6px 6px 0 0;
    transition: height 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    min-height: 4px;
  }
  .bar-fill.active   { background: var(--accent); }
  .bar-fill.has-data { background: #bfd0ff; }
  .bar-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif; text-transform: uppercase;
  }

  .cat-legend { display: flex; flex-direction: column; gap: 10px; }

  .cat-legend-row {
    display: flex; align-items: center; justify-content: space-between;
  }
  .cat-legend-left {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-soft); font-weight: 500;
  }
  .cat-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .cat-count { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }

  .motivation {
    background: linear-gradient(135deg, #eef1ff, #f0fff9);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .motivation .emoji { font-size: 28px; margin-bottom: 8px; }
  .motivation p { font-size: 13px; color: var(--text-soft); line-height: 1.6; }
  .motivation strong { color: var(--accent); }

  /* Dark theme */
  body.dark {
    --bg: #0f1117;
    --surface: #1a1d2b;
    --surface2: #141720;
    --border: #2a2d3e;
    --border2: #3a3d50;
    --accent: #a3ff47;
    --accent-light: #1e2a10;
    --text: #e8eaf2;
    --text-muted: #5a5f7a;
    --text-soft: #9a9fb8;
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
    --shadow-hover: 0 8px 24px rgba(0,0,0,0.5);
    --p-high: #ff4d6d; --p-high-bg: #1e0d12; --p-high-border: #3d1520;
    --p-mid: #ff9f43; --p-mid-bg: #1e1508; --p-mid-border: #3d2a10;
    --p-low: #26d07c; --p-low-bg: #0a1e14; --p-low-border: #123320;
  }
  body.dark .logo span { color: var(--accent); }
  body.dark .add-btn { background: var(--accent); color: #0f1117; box-shadow: 0 4px 16px rgba(163,255,71,0.25); }
  body.dark .add-btn:hover { box-shadow: 0 6px 22px rgba(163,255,71,0.38); }
  body.dark .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0f1117; }
  body.dark .week-mini.active { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 4px 16px rgba(163,255,71,0.18); }
  body.dark .week-mini.active .day-pct { color: var(--accent); }
  body.dark .week-mini.today .day-abbr { color: var(--accent); }
  body.dark .ring-fill { stroke: var(--accent); }
  body.dark .ring-pct { color: var(--accent); }
  body.dark .task-checkbox.checked { background: var(--accent); border-color: var(--accent); }
  body.dark .task-checkbox.checked::after { color: #0f1117; }
  body.dark .stat-value.blue { color: var(--accent); }
  body.dark .bar-fill.active { background: var(--accent); }
  body.dark .bar-fill.has-data { background: #2a3d1a; }
  body.dark .motivation { background: linear-gradient(135deg, #1a1d2b, #141e14); }
  body.dark .motivation strong { color: var(--accent); }
  body.dark .day-header { background: linear-gradient(135deg, #1a1d2b, #141720); }
  body.dark .badge-work     { background: #1a2040; color: #6a9fff; }
  body.dark .badge-personal { background: #2a1540; color: #c47fff; }
  body.dark .badge-health   { background: #0d2018; color: #40e090; }
  body.dark .badge-study    { background: #201808; color: #ffb060; }
  body.dark .badge-other    { background: #1a1d2b; color: #7a7f98; }
  body.dark .badge-high { background: var(--p-high-bg); color: var(--p-high); }
  body.dark .badge-mid  { background: var(--p-mid-bg);  color: var(--p-mid); }
  body.dark .badge-low  { background: var(--p-low-bg);  color: var(--p-low); }
  body, .stats-card, .day-panel, .week-mini, .motivation, .current-date,
  .add-form, .filters, .day-header, .task-item, .filter-btn, .select-styled, .add-input {
    transition: background 0.4s, border-color 0.35s, color 0.35s, box-shadow 0.35s;
  }

  /* Toggle switch */
  .header-right { display: flex; align-items: center; gap: 14px; }
  .theme-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .theme-icon { font-size: 15px; user-select: none; }
  .toggle-switch { position: relative; width: 48px; height: 26px; flex-shrink: 0; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track {
    position: absolute; inset: 0; background: var(--border2);
    border-radius: 100px; border: 1.5px solid var(--border);
    transition: background 0.3s, border-color 0.3s;
  }
  .toggle-switch input:checked ~ .toggle-track { background: #a3ff47; border-color: #a3ff47; }
  .toggle-thumb {
    position: absolute; top: 3px; left: 3px; width: 18px; height: 18px;
    background: #fff; border-radius: 50%;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  }
  .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(22px); background: #0f1117; }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo">Week<span>Flow</span></div>
    <div class="header-right">
      <label class="theme-toggle" title="Перемкнути тему">
        <span class="theme-icon">&#9728;&#65039;</span>
        <div class="toggle-switch">
          <input type="checkbox" id="themeToggle" onchange="toggleTheme(this)">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </div>
        <span class="theme-icon">&#127769;</span>
      </label>
      <div class="current-date" id="currentDate"></div>
    </div>
  </header>

  <div class="week-overview" id="weekOverview"></div>

  <div class="main-grid">
    <div class="day-panel">
      <div class="day-header">
        <div>
          <div style="font-size:11px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;font-weight:700;">Обраний день</div>
          <div class="day-title" id="selectedDayTitle">Понеділок</div>
        </div>
        <div class="day-progress-ring">
          <svg width="68" height="68" viewBox="0 0 68 68">
            <circle class="ring-bg" cx="34" cy="34" r="30"/>
            <circle class="ring-fill" id="ringFill" cx="34" cy="34" r="30"/>
          </svg>
          <div class="ring-pct" id="ringPct">0%</div>
        </div>
      </div>

      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">Всі</button>
        <button class="filter-btn" data-filter="cat-work"><span class="cat-dot" style="background:var(--c-work)"></span>Робота</button>
        <button class="filter-btn" data-filter="cat-personal"><span class="cat-dot" style="background:var(--c-personal)"></span>Особисте</button>
        <button class="filter-btn" data-filter="cat-health"><span class="cat-dot" style="background:var(--c-health)"></span>Здоров'я</button>
        <button class="filter-btn" data-filter="cat-study"><span class="cat-dot" style="background:var(--c-study)"></span>Навчання</button>
        <button class="filter-btn" data-filter="cat-other"><span class="cat-dot" style="background:var(--c-other)"></span>Інше</button>
      </div>

      <div class="task-list" id="taskList"></div>

      <div class="add-form">
        <div class="add-row-top">
          <input class="add-input" id="taskInput" placeholder="Назва задачі..." maxlength="120">
          <button class="add-btn" onclick="addTask()">+ Додати</button>
        </div>
        <div class="add-row-bottom">
          <select class="select-styled" id="catSelect">
            <option value="work">💼 Робота</option>
            <option value="personal">👤 Особисте</option>
            <option value="health">💪 Здоров'я</option>
            <option value="study">📚 Навчання</option>
            <option value="other">🔖 Інше</option>
          </select>
          <select class="select-styled" id="prioSelect">
            <option value="high">🔴 Високий пріоритет</option>
            <option value="mid">🟡 Середній пріоритет</option>
            <option value="low">🟢 Низький пріоритет</option>
          </select>
        </div>
      </div>
    </div>

    <div class="stats-panel">
      <div class="stats-card">
        <h3>Тиждень в цифрах</h3>
        <div class="stat-row">
          <span class="stat-label">Всього задач</span>
          <span class="stat-value blue" id="statTotal">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Виконано</span>
          <span class="stat-value green" id="statDone">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Залишилось</span>
          <span class="stat-value pink" id="statLeft">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Загальний %</span>
          <span class="stat-value blue" id="statPct">0%</span>
        </div>
      </div>

      <div class="stats-card">
        <h3>Прогрес по днях</h3>
        <div class="bar-chart" id="barChart"></div>
      </div>

      <div class="stats-card">
        <h3>Категорії (тиждень)</h3>
        <div class="cat-legend" id="catLegend"></div>
      </div>

      <div class="motivation" id="motivationBlock">
        <div class="emoji">🚀</div>
        <p>Додайте перші задачі та почніть продуктивний тиждень!</p>
      </div>
    </div>
  </div>
</div>

<script>
function toggleTheme(cb) {
  document.body.classList.toggle('dark', cb.checked);
  localStorage.setItem('wf_theme', cb.checked ? 'dark' : 'light');
}

const DAYS       = ['Понеділок','Вівторок','Середа','Четвер','Пятниця','Субота','Неділя'];
const DAYS_SHORT = ['Пн','Вт','Ср','Чт','Пт','Сб','Нд'];

const CATS = {
  work:     { label:'Робота',    color:'var(--c-work)',     badge:'badge-work' },
  personal: { label:'Особисте',  color:'var(--c-personal)', badge:'badge-personal' },
  health:   { label:"Здоров'я",  color:'var(--c-health)',   badge:'badge-health' },
  study:    { label:'Навчання',  color:'var(--c-study)',    badge:'badge-study' },
  other:    { label:'Інше',      color:'var(--c-other)',    badge:'badge-other' },
};

const PRIOS = {
  high: { label:'Високий', badge:'badge-high', cls:'priority-high' },
  mid:  { label:'Середній',badge:'badge-mid',  cls:'priority-mid'  },
  low:  { label:'Низький', badge:'badge-low',  cls:'priority-low'  },
};

const todayRaw = new Date().getDay();
const todayIdx = todayRaw === 0 ? 6 : todayRaw - 1;

let selectedDay  = todayIdx;
let activeFilter = 'all';

let tasks = JSON.parse(localStorage.getItem('wf_tasks_v2') || 'null')
  || Array.from({length:7}, ()=>[]);

function save() { localStorage.setItem('wf_tasks_v2', JSON.stringify(tasks)); }

function getDayStats(d) {
  const t = tasks[d];
  const total = t.length;
  const done  = t.filter(x=>x.done).length;
  const pct   = total ? Math.round(done/total*100) : 0;
  return { total, done, pct };
}

function renderWeekOverview() {
  const el = document.getElementById('weekOverview');
  el.innerHTML = '';
  DAYS.forEach((_, i) => {
    const {total, pct} = getDayStats(i);
    const div = document.createElement('div');
    div.className = 'week-mini' + (i===selectedDay?' active':'') + (i===todayIdx?' today':'');
    div.style.setProperty('--pct', pct/100);
    div.innerHTML = `
      <div class="day-abbr">${DAYS_SHORT[i]}</div>
      <div class="day-pct">${pct}%</div>
      <div class="day-task-count">${total} задач</div>
    `;
    div.onclick = () => selectDay(i);
    el.appendChild(div);
  });
}

function getFilteredTasks() {
  const t = tasks[selectedDay];
  if (activeFilter === 'all') return t.map((task,i) => ({task,i}));
  const cat = activeFilter.replace('cat-','');
  return t.map((task,i) => ({task,i})).filter(({task}) => task.cat === cat);
}

function renderTaskList() {
  const el = document.getElementById('taskList');
  document.getElementById('selectedDayTitle').textContent = DAYS[selectedDay];
  const filtered = getFilteredTasks();

  if (filtered.length === 0) {
    const msg = activeFilter === 'all'
      ? 'Задач ще немає<br><small>Додайте першу задачу нижче</small>'
      : 'Немає задач у цій категорії';
    el.innerHTML = `<div class="task-empty"><div class="empty-icon">📋</div><div>${msg}</div></div>`;
  } else {
    el.innerHTML = filtered.map(({task, i}) => `
      <div class="task-item ${PRIOS[task.prio].cls}">
        <div class="task-checkbox ${task.done?'checked':''}" onclick="toggleTask(${i})"></div>
        <div class="task-body">
          <div class="task-meta">
            <span class="task-cat-badge ${CATS[task.cat].badge}">${CATS[task.cat].label}</span>
            <span class="task-priority-badge ${PRIOS[task.prio].badge}">${PRIOS[task.prio].label}</span>
          </div>
          <div class="task-text ${task.done?'done':''}">${escHtml(task.text)}</div>
        </div>
        <button class="task-delete" onclick="deleteTask(${i})">×</button>
      </div>
    `).join('');
  }

  updateRing();
}

function updateRing() {
  const {pct} = getDayStats(selectedDay);
  const c = 188;
  document.getElementById('ringFill').style.strokeDashoffset = c - (c * pct / 100);
  document.getElementById('ringPct').textContent = pct + '%';
}

function renderStats() {
  let total=0, done=0;
  tasks.forEach(d => { total+=d.length; done+=d.filter(x=>x.done).length; });
  const pct = total ? Math.round(done/total*100) : 0;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent  = done;
  document.getElementById('statLeft').textContent  = total - done;
  document.getElementById('statPct').textContent   = pct + '%';

  const bc = document.getElementById('barChart');
  bc.innerHTML = '';
  const maxT = Math.max(1, ...tasks.map(d=>d.length));
  tasks.forEach((d, i) => {
    const {total:t} = getDayStats(i);
    const h = t ? Math.max(8, Math.round(t/maxT*100)) : 5;
    const wrap = document.createElement('div');
    wrap.className = 'bar-wrap';
    wrap.innerHTML = `
      <div class="bar-col">
        <div class="bar-fill ${i===selectedDay?'active':(t>0?'has-data':'')}" style="height:${h}%"></div>
      </div>
      <div class="bar-label">${DAYS_SHORT[i]}</div>
    `;
    wrap.onclick = () => selectDay(i);
    bc.appendChild(wrap);
  });

  const catCounts = {};
  Object.keys(CATS).forEach(k => catCounts[k] = 0);
  tasks.forEach(d => d.forEach(t => { catCounts[t.cat] = (catCounts[t.cat]||0)+1; }));

  document.getElementById('catLegend').innerHTML = Object.entries(CATS).map(([key, info]) => `
    <div class="cat-legend-row">
      <div class="cat-legend-left">
        <div class="cat-color-dot" style="background:${info.color}"></div>
        ${info.label}
      </div>
      <div class="cat-count">${catCounts[key]||0}</div>
    </div>
  `).join('');

  const el = document.getElementById('motivationBlock');
  if (total === 0) {
    el.innerHTML = `<div class="emoji">🚀</div><p>Додайте перші задачі та почніть продуктивний тиждень!</p>`;
  } else if (pct === 100) {
    el.innerHTML = `<div class="emoji">🏆</div><p><strong>Неймовірно!</strong> Всі задачі виконано. Ви — машина продуктивності!</p>`;
  } else if (pct >= 70) {
    el.innerHTML = `<div class="emoji">🔥</div><p><strong>${pct}% виконано!</strong> Ще трохи — і тиждень закритий!</p>`;
  } else if (pct >= 40) {
    el.innerHTML = `<div class="emoji">⚡</div><p>Гарний темп! <strong>${done}</strong> виконано, <strong>${total-done}</strong> ще попереду.</p>`;
  } else {
    el.innerHTML = `<div class="emoji">🌱</div><p>Маєте <strong>${total} задач</strong> цього тижня. Кожен крок — це прогрес!</p>`;
  }
}

function renderAll() {
  renderWeekOverview();
  renderTaskList();
  renderStats();
}

function selectDay(i) { selectedDay = i; renderAll(); }

function addTask() {
  const inp  = document.getElementById('taskInput');
  const cat  = document.getElementById('catSelect').value;
  const prio = document.getElementById('prioSelect').value;
  const text = inp.value.trim();
  if (!text) { inp.focus(); return; }
  tasks[selectedDay].push({ id: Date.now(), text, cat, prio, done: false });
  inp.value = '';
  inp.focus();
  save();
  renderAll();
}

function toggleTask(i) {
  tasks[selectedDay][i].done = !tasks[selectedDay][i].done;
  save(); renderAll();
}

function deleteTask(i) {
  tasks[selectedDay].splice(i, 1);
  save(); renderAll();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.addEventListener('DOMContentLoaded', () => {
  const d = new Date();
  const savedTheme = localStorage.getItem('wf_theme');
  if (savedTheme === 'dark') {
    document.body.classList.add('dark');
    const cb = document.getElementById('themeToggle');
    if (cb) cb.checked = true;
  }

  document.getElementById('currentDate').textContent =
    d.toLocaleDateString('uk-UA', { weekday:'long', day:'numeric', month:'long' });

  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderTaskList();
  });

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  renderAll();
});
</script>
</body>
</html>
